<style>
:root{
  --blue:#4361ee;--violet:#7c3aed;--teal:#0d9488;--green:#16a34a;

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hero{background:linear-gradient(135deg,#1e3a8a 0%,#4361ee 55%,#7c3aed 100%);padding:48px 24px 40px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Ccircle cx='30' cy='30' r='4' fill='%23ffffff' fill-opacity='0.04'/%3E%3C/g%3E%3C/svg%3E");}
.hero-badge{display:inline-block;background:rgba(255,255,255,.15);color:#fff;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border-radius:999px;margin-bottom:16px;border:1px solid rgba(255,255,255,.25);}
.hero h1{color:#fff;font-size:clamp(26px,5vw,42px);font-weight:800;line-height:1.15;margin-bottom:10px;}

.stepper-wrap{background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.stepper{display:flex;align-items:stretch;min-width:max-content;padding:0 12px;}
.step-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 10px 12px;cursor:pointer;border:none;background:none;font-family:inherit;font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;position:relative;transition:color .2s;min-width:68px;}
.step-btn::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:3px;background:transparent;border-radius:3px 3px 0 0;transition:background .2s;}
.step-btn .s-icon{font-size:20px;line-height:1;}
.step-btn.active{color:var(--blue);}
.step-btn.active::after{background:var(--blue);}
.step-btn.done{color:var(--green);}
.step-btn.done::after{background:var(--green);}
.container{max-width:780px;margin:0 auto;padding:32px 16px 120px;}
.step-panel{display:none;animation:fadeUp .35s ease both;}
.step-panel.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.sec-title{font-size:22px;font-weight:800;margin-bottom:6px;}
.sec-sub{color:var(--muted);font-size:14px;margin-bottom:24px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px;border:1px solid var(--border);}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
.vocab-item{background:linear-gradient(135deg,#eff6ff,#f5f3ff);border:1px solid #c7d2fe;border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.vocab-word{font-weight:700;font-size:14px;color:var(--text);flex:1;}
.vocab-ua{font-size:12px;color:var(--muted);font-weight:500;margin-top:3px;}
.speak-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;}
.speak-btn:hover{background:var(--violet);}
.listen-all-btn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff;border:none;border-radius:12px;padding:12px 24px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px;transition:opacity .2s;}
.listen-all-btn:hover{opacity:.88;}
.conv-img{width:100%;border-radius:12px;margin-bottom:16px;display:block;}
.audio-player{width:100%;margin-bottom:20px;}
.quiz-q{margin-bottom:20px;}
.quiz-q p{font-weight:700;font-size:15px;margin-bottom:10px;}
.quiz-opts{display:flex;flex-direction:column;gap:8px;}
.quiz-opt{background:#f8fafc;border:2px solid var(--border);border-radius:10px;padding:11px 16px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;text-align:left;transition:all .18s;}
.quiz-opt:hover:not(:disabled){border-color:var(--blue);background:#eff6ff;}
.quiz-opt.correct{border-color:var(--green);background:#f0fdf4;color:var(--green);}
.quiz-opt.wrong{border-color:var(--red);background:#fef2f2;color:var(--red);}
.quiz-opt:disabled{cursor:default;}
.quiz-result{margin-top:14px;padding:12px 16px;border-radius:10px;font-weight:700;font-size:15px;}
.quiz-result.pass{background:#f0fdf4;color:var(--green);}
.quiz-result.fail{background:#fef2f2;color:var(--red);}
.pzl-word-bank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
.pzl-chip{background:linear-gradient(135deg,#eff6ff,#f5f3ff);border:1px solid #c7d2fe;border-radius:8px;padding:5px 12px;font-size:13px;font-weight:700;color:var(--violet);}

.pzl-sel{border:2px solid #c7d2fe;border-radius:8px;padding:3px 8px;font-family:inherit;font-size:14px;font-weight:600;background:#f5f3ff;color:var(--violet);cursor:pointer;outline:none;}
.pzl-sel.correct{border-color:var(--green);background:#f0fdf4;color:var(--green);}
.pzl-sel.wrong{border-color:var(--red);background:#fef2f2;color:var(--red);}

.pzl-score{margin-top:10px;font-weight:700;color:var(--teal);}
.car-slide{display:none;}
.car-slide.active{display:block;}
.car-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:20px;}

.car-nav button:disabled{background:var(--border);color:var(--muted);cursor:default;}
.car-counter{font-weight:700;color:var(--muted);font-size:14px;}
.reading-conv{font-size:15px;line-height:2;}
.reading-line{margin-bottom:4px;}
.reading-speaker{font-weight:800;color:var(--blue);}
.reading-tip{background:#f0fdf4;border-left:4px solid var(--teal);padding:12px 16px;border-radius:0 10px 10px 0;font-size:13px;color:#065f46;margin-bottom:18px;}

.fc-card{height:140px;perspective:800px;cursor:pointer;}
.fc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.fc-card.flipped .fc-inner{transform:rotateY(180deg);}

.flip-all-btn{background:linear-gradient(135deg,var(--violet),var(--blue));color:#fff;border:none;border-radius:12px;padding:12px 24px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;}
.flip-all-btn:hover{opacity:.88;}
.sp-blank{display:inline-block;width:260px;border-bottom:2px dashed var(--violet);color:var(--muted);font-size:13px;font-style:italic;}
.sp-interview-note{font-size:12px;color:var(--muted);font-style:italic;text-align:center;margin-bottom:16px;}
.sp-line{margin-bottom:12px;font-size:15px;line-height:1.6;}
.sp-role{font-weight:800;color:var(--violet);margin-right:6px;}
.sp-text{color:var(--text);}
.sp-car-title{font-weight:800;font-size:17px;color:var(--blue);margin-bottom:16px;}
.vimeo-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:14px;overflow:hidden;margin-bottom:20px;}
.vimeo-wrap iframe{position:absolute;inset:0;width:100%;height:100%;}
.conv-list{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
.conv-list li{background:linear-gradient(135deg,#eff6ff,#f5f3ff);border:1px solid #c7d2fe;border-radius:10px;padding:12px 14px;font-weight:600;font-size:14px;}
.nav-row{display:flex;justify-content:space-between;margin-top:28px;gap:12px;}
.nav-btn{flex:1;padding:13px 20px;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
.nav-btn.prev{background:var(--border);color:var(--muted);}
.nav-btn.prev:hover{background:#cbd5e1;}
.nav-btn.next{background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff;}
.nav-btn.next:hover{opacity:.88;}
.results-fab{position:fixed;bottom:24px;right:20px;z-index:999;background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff;border:none;border-radius:999px;padding:13px 20px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 6px 24px rgba(67,97,238,.35);transition:transform .2s;}
.results-fab:hover{transform:scale(1.05);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:20px;padding:28px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:20px;font-weight:800;margin-bottom:18px;}
.results-table{width:100%;border-collapse:collapse;margin-bottom:18px;font-size:14px;}
.results-table th{background:#f1f5f9;padding:8px 12px;text-align:left;font-weight:700;}
.results-table td{padding:8px 12px;border-top:1px solid var(--border);}
.results-total{font-size:20px;font-weight:800;text-align:center;margin:16px 0;color:var(--blue);}
.results-textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:12px;resize:vertical;height:120px;}
.copy-btn{width:100%;margin-top:10px;background:var(--teal);color:#fff;border:none;border-radius:10px;padding:11px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.close-btn{width:100%;margin-top:8px;background:var(--border);color:var(--text);border:none;border-radius:10px;padding:11px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
</style>

<body>

<div class="hero">
  <div class="hero-badge">Way2English · A2 · Lesson 01</div>
  <h1>Present Simple</h1>

<div class="stepper-wrap"><div class="stepper" id="stepper"></div></div>

<script>

const CONVS=[

    img:'A2-01-1-Present-Simple-Job.jpg', audio:'A2-01-1-Present-Simple-Job.mp3',
    text:[

      {role:'Woman', line:'I work at a tech company.'},
      {role:'Man',   line:'Oh, what do you do there?'},

      {role:'Woman', line:'Yeah, I enjoy it.'},

    ],

function showPzlSlide(idx){
  carState.p=idx;
  document.querySelectorAll('.pzl-card').forEach((c,i)=>c.style.display=i===idx?'block':'none');
  document.getElementById('pzl-prev').disabled=idx===0;
  document.getElementById('pzl-next').disabled=idx===3;
  document.getElementById('pzl-ind').textContent=(idx+1)+' / 4';
}

function showCarSlide(id,idx){
  carState[id]=idx;
  const prefix=id==='r'?'rslide':'spslide';
  document.querySelectorAll(`[id^="${prefix}-"]`).forEach((s,i)=>s.style.display=i===idx?'block':'none');
  document.getElementById(id+'-prev').disabled=idx===0;
  document.getElementById(id+'-next').disabled=idx===3;
  document.getElementById(id+'-ind').textContent=(idx+1)+' / 4';
}

function navCar(id,dir){
  let n=(carState[id]||0)+dir;
  if(n<0)n=0;if(n>3)n=3;
  if(id==='p')showPzlSlide(n);
  else showCarSlide(id,n);
}

function toggleAllCards(){
  allFlipped=!allFlipped;
  document.querySelectorAll('.fc-card').forEach(c=>{
    if(allFlipped)c.classList.add('flipped');
    else c.classList.remove('flipped');
  });
}

function updateTopBadge(){
  let g=0,t=0;
  for(let i=1;i<=4;i++){const s=quizScores['q'+i];if(s){g+=s.got;t+=s.total;}}
  for(let i=1;i<=4;i++){const s=puzzleScores['p'+i];if(s){g+=s.got;t+=s.total;}}
  document.getElementById('topScore').textContent=g+'/'+t;
}

function openResults(){
  let rows='',g=0,t=0;
  for(let i=1;i<=4;i++){const s=quizScores['q'+i];const v=s?s.got+'/'+s.total:'—';if(s){g+=s.got;t+=s.total;}rows+=`<tr><td>Quiz ${i}</td><td>${v}</td></tr>`;}
  for(let i=1;i<=4;i++){const s=puzzleScores['p'+i];const v=s?s.got+'/'+s.total:'—';if(s){g+=s.got;t+=s.total;}rows+=`<tr><td>Puzzle ${i}</td><td>${v}</td></tr>`;}
  document.getElementById('resultsBody').innerHTML=rows;
  const pct=t>0?Math.round(g/t*100):0;
  const medal=pct>=90?'🏆':pct>=70?'🌟':pct>=50?'👍':'💪';
  document.getElementById('resultsTotal').textContent=medal+' '+g+'/'+t+' — '+pct+'%';
  let txt='A2-01 Present Simple\n'+'─'.repeat(28)+'\n';
  for(let i=1;i<=4;i++){const s=quizScores['q'+i];txt+='Quiz '+i+': '+(s?s.got+'/'+s.total:'—')+'\n';}
  for(let i=1;i<=4;i++){const s=puzzleScores['p'+i];txt+='Puzzle '+i+': '+(s?s.got+'/'+s.total:'—')+'\n';}
  txt+='─'.repeat(28)+'\nЗагалом: '+g+'/'+t+' ('+pct+'%)\n';
  document.getElementById('resultsText').value=txt;
  document.getElementById('resultsModal').classList.add('open');
}

function closeResults(){document.getElementById('resultsModal').classList.remove('open');}
function finishLesson(){openResults();document.querySelector('.results-txt-wrap').style.display='block';}
function copyResults(){
  const ta=document.getElementById('resultsText');
  ta.select();
  document.execCommand('copy');
  const btn=document.querySelector('.copy-btn');
  btn.textContent='✅ Скопійовано!';
  setTimeout(()=>{btn.innerHTML='📋 Копіювати результат для вчителя';},2000);
}

buildStepper();
buildPanels();
</script>
